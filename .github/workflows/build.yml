name: Build & Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend (vite)
        run: npm run build

      # Compile-only build: --no-bundle skips the platform installer step.
      # Real bundling (.dmg / .msi / .icns / .ico) lives in Milestone E,
      # where icon generation and packaging are first-class deliverables.
      - name: Build Tauri app (compile only, no bundle)
        run: npx tauri build --no-bundle --target ${{ matrix.target }}

      - name: Upload macOS binary
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: hamsktop-${{ matrix.platform }}
          if-no-files-found: warn
          path: src-tauri/target/${{ matrix.target }}/release/hamsktop

      - name: Upload Windows binary
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: hamsktop-${{ matrix.platform }}
          if-no-files-found: warn
          path: src-tauri/target/${{ matrix.target }}/release/hamsktop.exe
